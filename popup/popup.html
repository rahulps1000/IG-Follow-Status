<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<title>Instagram Follow Status</title>
		<link
			rel="stylesheet"
			href="popup.css"
		/>
	</head>
	<body>
		<div class="app">
			<header class="header">
				<div class="header-left">
					<div class="logo">
						<img
							src="../assets/logo.png"
							alt="Instagram Follow Status"
						/>
					</div>
					<div>
						<h1>IG Follow Status</h1>
						<p>Follow-back indicators</p>
					</div>
				</div>
				<div class="header-actions">
					<button
						id="themeBtn"
						class="icon-btn"
						title="Theme"
					>
						<svg
							xmlns="http://www.w3.org/2000/svg"
							width="24"
							height="24"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
							class="lucide lucide-sun-icon lucide-sun"
						>
							<circle
								cx="12"
								cy="12"
								r="4"
							/>
							<path d="M12 2v2" />
							<path d="M12 20v2" />
							<path d="m4.93 4.93 1.41 1.41" />
							<path d="m17.66 17.66 1.41 1.41" />
							<path d="M2 12h2" />
							<path d="M20 12h2" />
							<path d="m6.34 17.66-1.41 1.41" />
							<path d="m19.07 4.93-1.41 1.41" />
						</svg>
					</button>
					<div
						id="themePopover"
						class="theme-popover hidden"
					>
						<button
							class="theme-option active"
							data-theme="system"
						>
							<span>
								<svg
									xmlns="http://www.w3.org/2000/svg"
									width="16"
									height="16"
									viewBox="0 0 24 24"
									fill="none"
									stroke="currentColor"
									stroke-width="2"
									stroke-linecap="round"
									stroke-linejoin="round"
									class="lucide lucide-monitor-icon lucide-monitor"
								>
									<rect
										width="20"
										height="14"
										x="2"
										y="3"
										rx="2"
									/>
									<line
										x1="8"
										x2="16"
										y1="21"
										y2="21"
									/>
									<line
										x1="12"
										x2="12"
										y1="17"
										y2="21"
									/>
								</svg>
							</span>
							<span>System</span>
							<span class="checkmark">✓</span>
						</button>
						<button
							class="theme-option"
							data-theme="light"
						>
							<span>
								<svg
									xmlns="http://www.w3.org/2000/svg"
									width="16"
									height="16"
									viewBox="0 0 24 24"
									fill="none"
									stroke="currentColor"
									stroke-width="2"
									stroke-linecap="round"
									stroke-linejoin="round"
									class="lucide lucide-sun-icon lucide-sun"
								>
									<circle
										cx="12"
										cy="12"
										r="4"
									/>
									<path d="M12 2v2" />
									<path d="M12 20v2" />
									<path d="m4.93 4.93 1.41 1.41" />
									<path d="m17.66 17.66 1.41 1.41" />
									<path d="M2 12h2" />
									<path d="M20 12h2" />
									<path d="m6.34 17.66-1.41 1.41" />
									<path d="m19.07 4.93-1.41 1.41" />
								</svg>
							</span>
							<span>Light</span>
							<span class="checkmark">✓</span>
						</button>
						<button
							class="theme-option"
							data-theme="dark"
						>
							<span>
								<svg
									xmlns="http://www.w3.org/2000/svg"
									width="16"
									height="16"
									viewBox="0 0 24 24"
									fill="none"
									stroke="currentColor"
									stroke-width="2"
									stroke-linecap="round"
									stroke-linejoin="round"
									class="lucide lucide-moon-icon lucide-moon"
								>
									<path
										d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"
									/>
								</svg>
							</span>
							<span>Dark</span>
							<span class="checkmark">✓</span>
						</button>
					</div>
					<button
						id="githubBtn"
						class="icon-btn"
						title="GitHub"
					>
						<a
							href="https://github.com/rahulps1000/IG-Follow-Status"
							target="_blank"
						>
							<svg
								viewBox="0 0 24 24"
								fill="currentColor"
							>
								<path
								d="M12 .5C5.65.5.5 5.65.5 12A11.5 11.5 0 0 0 8.36 22.9c.58.1.79-.25.79-.56v-2.17c-3.18.69-3.85-1.53-3.85-1.53-.52-1.32-1.27-1.67-1.27-1.67-1.04-.72.08-.71.08-.71 1.15.08 1.75 1.18 1.75 1.18 1.02 1.75 2.67 1.25 3.32.95.1-.74.4-1.25.72-1.54-2.54-.29-5.21-1.27-5.21-5.67 0-1.25.45-2.28 1.18-3.09-.12-.29-.51-1.47.11-3.06 0 0 .96-.31 3.15 1.18a10.93 10.93 0 0 1 5.74 0c2.18-1.49 3.14-1.18 3.14-1.18.63 1.59.24 2.77.12 3.06.73.81 1.17 1.84 1.17 3.09 0 4.41-2.68 5.38-5.24 5.66.41.35.77 1.04.77 2.1v3.11c0 .31.21.67.8.56A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5z"
							/>
						</svg>
					</button>
					</a>
				</div>
			</header>
			<section class="card">
				<div class="setting">
					<div>
						<h3>Enable Extension</h3>
						<span> Activate relationship indicators </span>
					</div>
					<label class="switch">
						<input
							id="enabled"
							type="checkbox"
							checked
						/>
						<span class="slider"></span>
					</label>
				</div>
			</section>
			<section class="card">
				<h2>Appearance</h2>
				<label> Badge Style </label>
				<div class="segment">
					<button data-style="dot">Dot</button>
					<button data-style="text">Text</button>
					<button data-style="color">Color</button>
				</div>
				<div class="setting">
					<span> Show Tooltips </span>
					<label class="switch">
						<input
							id="tooltips"
							type="checkbox"
							checked
						/>
						<span class="slider"></span>
					</label>
				</div>
				<div class="setting">
					<span> Compact Mode </span>
					<label class="switch">
						<input
							id="compactMode"
							type="checkbox"
						/>
						<span class="slider"></span>
					</label>
				</div>
			</section>
			<section class="card">
				<h2>Relationship Legend</h2>
				<div class="legend-item">
					<span class="legend-dot mutual"></span>
					<span>Mutual Follow</span>
				</div>
				<div class="legend-item">
					<span class="legend-dot follows-you"></span>
					<span>Follows You</span>
				</div>
				<div class="legend-item">
					<span class="legend-dot you-follow"></span>
					<span>You Follow</span>
				</div>
				<div class="legend-item">
					<span class="legend-dot none"></span>
					<span>No Connection</span>
				</div>
			</section>
			<footer>
				<span> Made with ❤️ by Rahul </span>
				<span> v1.0.0 </span>
			</footer>
		</div>
		<script src="../shared/constants.js"></script>
		<script src="../shared/storage.js"></script>
		<script src="popup.js"></script>
	</body>
</html>
